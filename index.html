<title>Cyberball</title>

<body>

<div id="game">

<h2 id="title">
Cyberball
</h2>

<p id="welcome">

In diesem Experiment wird menschliches Verhalten in einem Online-Spiel untersucht.

Wenn der Ball Ihnen zugeworfen wird,
wählen Sie den Spieler aus, dem Sie den Ball zurückwerfen möchten.
</p>

Play
</button>

</div>

Ich
</div>


<div class="player" id="p3">
Spieler 3
</div>


<div id="ball">
⚪
</div>


<div id="choice"></div>


</div>
